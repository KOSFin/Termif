name: ci-windows

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish GitHub Release
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ci-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --all-targets --all-features

      - name: Tauri smoke build (no bundle)
        run: npm run tauri:build -- --no-bundle

  build-artifacts:
    needs: quality
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build metadata
        id: meta
        shell: pwsh
        run: |
          $baseVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $shortSha = "${env:GITHUB_SHA}".Substring(0, 7)
          $refName = "${env:GITHUB_REF_NAME}"
          $isTagBuild = "${env:GITHUB_REF}" -like "refs/tags/v*"


          if ($isTagBuild) {
            $rawTagVersion = $refName.Substring(1)
            if ($rawTagVersion -match '^(\d+)\.(\d+)\.(\d+)\.(\d+)$') {
              # Normalize legacy 4-part tag version to SemVer build metadata.
              $appVersion = "$($Matches[1]).$($Matches[2]).$($Matches[3])+build.$($Matches[4])"
            }
            elseif ($rawTagVersion -match '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
              $appVersion = $rawTagVersion
            }
            else {
              throw "Tag version '$rawTagVersion' must be SemVer (for example: 1.2.3, 1.2.3-rc.1, 1.2.3+build.7)"
            }
            $releaseTag = $refName
            $releaseName = "Termif $appVersion"
            $preRelease = "false"
            $publishRelease = "true"
          }
          else {
            # Build a CI semver compatible with Tauri: X.Y.Z-ci.<run_number>
            if ($baseVersion -notmatch '^(\d+)\.(\d+)\.(\d+)(?:[-+][0-9A-Za-z.-]+)?$') {
              throw "Base version must start with X.Y.Z"
            }
            $major = $Matches[1]
            $minor = $Matches[2]
            $patch = $Matches[3]
            $appVersion = "$major.$minor.$patch-ci.$env:GITHUB_RUN_NUMBER"
            $safeRef = $refName -replace '[^A-Za-z0-9._-]', '-'
            $releaseTag = "ci-$safeRef-$env:GITHUB_RUN_NUMBER-$shortSha"
            $releaseName = "Termif CI $safeRef $shortSha"
            $preRelease = "true"
            if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.publish_release }}" -eq "false") {
              $publishRelease = "false"
            }
            else {
              $publishRelease = "true"
            }
          }

          $artifactName = "termif-windows-x64-$releaseTag"

          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$preRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "publish_release=$publishRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Apply build version
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.meta.outputs.app_version }}
        run: |
          $packageJson = Get-Content package.json -Raw | ConvertFrom-Json
          $packageJson.version = $env:APP_VERSION
          $packageJson | ConvertTo-Json -Depth 100 | Set-Content package.json -Encoding utf8

          $tauriConfig = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauriConfig.version = $env:APP_VERSION
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json -Encoding utf8

          $cargoToml = Get-Content src-tauri/Cargo.toml
          $inPackage = $false
          $updated = $false

          for ($i = 0; $i -lt $cargoToml.Length; $i++) {
            if ($cargoToml[$i] -match '^\[package\]') {
              $inPackage = $true
              continue
            }
            if ($inPackage -and $cargoToml[$i] -match '^\[') {
              $inPackage = $false
            }
            if ($inPackage -and $cargoToml[$i] -match '^version\s*=') {
              $cargoToml[$i] = 'version = "' + $env:APP_VERSION + '"'
              $updated = $true
              break
            }
          }

          if (-not $updated) {
            throw "Failed to update [package] version in src-tauri/Cargo.toml"
          }

          Set-Content src-tauri/Cargo.toml -Value $cargoToml -Encoding utf8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (MSI-patched)
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.meta.outputs.app_version }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          $tauriPath = "src-tauri/tauri.conf.json"
          $backupPath = "src-tauri/tauri.conf.json.bak"
          Copy-Item $tauriPath $backupPath -Force
          try {
            $tauriConfig = Get-Content $tauriPath -Raw | ConvertFrom-Json

            $sourceVersion = $env:APP_VERSION
            if ([string]::IsNullOrWhiteSpace($sourceVersion)) {
              $sourceVersion = [string]$tauriConfig.version
            }

            if ($sourceVersion -notmatch '^(\d+)\.(\d+)\.(\d+)') {
              throw "Version '$sourceVersion' does not start with X.Y.Z"
            }

            $major = $Matches[1]
            $minor = $Matches[2]
            $patch = $Matches[3]

            $buildNumber = 0
            if ($env:GITHUB_RUN_NUMBER -match '^\d+$') {
              $buildNumber = [int]$env:GITHUB_RUN_NUMBER
            }
            elseif ($sourceVersion -match '(\d+)$') {
              $buildNumber = [int]$Matches[1]
            }

            # MSI requires a numeric revision in 0..65535.
            if ($buildNumber -gt 65535) {
              $buildNumber = $buildNumber % 65535
              if ($buildNumber -eq 0) { $buildNumber = 65535 }
            }

            # Keep version as semver, use productVersion for MSI 4-part version
            $msiVersion = "$major.$minor.$patch.$buildNumber"

            # Add bundle.windows.productVersion for MSI
            if (-not $tauriConfig.bundle.windows) {
              $tauriConfig.bundle | Add-Member -MemberType NoteProperty -Name windows -Value ([PSCustomObject]@{})
            }
            $tauriConfig.bundle.windows | Add-Member -MemberType NoteProperty -Name productVersion -Value $msiVersion -Force

            $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content $tauriPath -Encoding utf8

            npm run tauri:build
          }
          finally {
            if (Test-Path $backupPath) {
              Move-Item $backupPath $tauriPath -Force
            }
          }

      - name: Collect bundles and checksums
        shell: pwsh
        run: |
          New-Item -Path release-artifacts -ItemType Directory -Force | Out-Null

          $bundleFiles = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in @('.msi', '.exe', '.sig') }

          if (-not $bundleFiles) {
            throw "No release bundles were produced by tauri build"
          }

          foreach ($file in $bundleFiles) {
            Copy-Item -Path $file.FullName -Destination (Join-Path release-artifacts $file.Name) -Force
          }

          $checksumLines = @()
          $checksummed = Get-ChildItem -Path release-artifacts -File |
            Where-Object { $_.Extension -in @('.msi', '.exe') }

          foreach ($file in $checksummed) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
            $checksumLines += "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $file.Name
          }

          if (-not $checksumLines) {
            throw "No .msi or .exe files were found for checksum generation"
          }

          Set-Content -Path release-artifacts/checksums.txt -Value $checksumLines -Encoding ascii

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: release-artifacts/*
          if-no-files-found: error

  release:
    needs: build-artifacts
    if: needs.build-artifacts.outputs.publish_release == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-artifacts.outputs.artifact_name }}
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-artifacts.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.build-artifacts.outputs.release_name }}
          prerelease: ${{ needs.build-artifacts.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/*.msi
            release-artifacts/*.exe
            release-artifacts/*.sig
            release-artifacts/checksums.txt
