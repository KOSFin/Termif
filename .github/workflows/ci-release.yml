name: ci-release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release SemVer (example: 1.2.3 or 1.2.3-beta.1). Empty = parse last commit."
        required: false
        type: string
        default: ""
      release_channel:
        description: Release channel
        required: false
        type: choice
        default: auto
        options:
          - auto
          - stable
          - beta
          - alpha
          - rc
          - nightly
          - unstable
      publish_release:
        description: Publish GitHub Release
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_channel: ${{ steps.meta.outputs.release_channel }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      stable_update: ${{ steps.meta.outputs.stable_update }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      release_reason: ${{ steps.meta.outputs.release_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build metadata
        id: meta
        shell: bash
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.release_version }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.release_channel || 'auto' }}
          PUBLISH_RELEASE_INPUT: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          commit_message="$(git log -1 --pretty=%B)"
          COMMIT_MESSAGE="${commit_message}" node scripts/resolve-release-metadata.mjs

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend tests
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --all-targets --all-features

  build:
    needs: [metadata]
    if: github.event_name != 'pull_request' && needs.metadata.outputs.publish_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: termif-windows-x64
            build_script: tauri:build:windows
          - os: macos-13
            artifact_name: termif-macos-x64
            build_script: tauri:build:macos
          - os: macos-latest
            artifact_name: termif-macos-arm64
            build_script: tauri:build:macos
          - os: ubuntu-latest
            artifact_name: termif-linux-x64
            build_script: tauri:build:linux
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Apply build version
        shell: bash
        env:
          APP_VERSION: ${{ needs.metadata.outputs.app_version }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STABLE_UPDATE: ${{ needs.metadata.outputs.stable_update }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node scripts/apply-build-metadata.mjs

      - name: Validate updater signing secrets
        if: needs.metadata.outputs.stable_update == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          set -euo pipefail
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" || -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            echo "Stable updater releases require TAURI_SIGNING_PRIVATE_KEY and TAURI_UPDATER_PUBKEY secrets." >&2
            exit 1
          fi

      - name: Build Tauri bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run ${{ matrix.build_script }}

      - name: Collect bundles and checksums
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p release-artifacts

          while IFS= read -r -d '' file; do
            cp "${file}" "release-artifacts/${ARTIFACT_NAME}-$(basename "${file}")"
          done < <(find src-tauri/target/release/bundle -type f \( \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name '*.rpm' -o \
            -name '*.tar.gz' -o \
            -name '*.sig' \
          \) -print0)

          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            while IFS= read -r -d '' app; do
              ditto -c -k --sequesterRsrc --keepParent "${app}" "release-artifacts/${ARTIFACT_NAME}-$(basename "${app}").zip"
            done < <(find src-tauri/target/release/bundle -maxdepth 3 -type d -name '*.app' -print0)
          fi

          count="$(find release-artifacts -type f | wc -l | tr -d ' ')"
          if [[ "${count}" == "0" ]]; then
            echo "No release bundles were produced by tauri build" >&2
            exit 1
          fi

          node - <<'NODE'
          const crypto = require("crypto");
          const fs = require("fs");
          const path = require("path");
          const dir = "release-artifacts";
          const artifact = process.env.ARTIFACT_NAME;
          const files = fs.readdirSync(dir)
            .filter((name) => !name.startsWith("checksums-"))
            .sort();
          const lines = files.map((name) => {
            const bytes = fs.readFileSync(path.join(dir, name));
            return `${crypto.createHash("sha256").update(bytes).digest("hex")}  ${name}`;
          });
          fs.writeFileSync(path.join(dir, `checksums-${artifact}.txt`), `${lines.join("\n")}\n`);
          NODE

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ needs.metadata.outputs.release_tag }}
          path: release-artifacts/*
          if-no-files-found: error

  release:
    needs: [metadata, quality, build]
    if: needs.metadata.outputs.publish_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create stable updater manifest
        if: needs.metadata.outputs.stable_update == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          APP_VERSION: ${{ needs.metadata.outputs.app_version }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        run: node scripts/create-latest-json.mjs

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.metadata.outputs.release_name }}
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/*.msi
            release-artifacts/*.exe
            release-artifacts/*.dmg
            release-artifacts/*.zip
            release-artifacts/*.deb
            release-artifacts/*.AppImage
            release-artifacts/*.rpm
            release-artifacts/*.tar.gz
            release-artifacts/*.sig
            release-artifacts/latest.json
            release-artifacts/checksums-*.txt
