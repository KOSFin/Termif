name: ✨ Feature request
description: Suggest an idea or improvement for Termif
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem you want solved, not only the solution you have in mind.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and the roadmap and this is not a duplicate.
          required: true
        - label: I checked the [ROADMAP.md](https://github.com/KOSFin/Termif/blob/main/ROADMAP.md).
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and where does Termif get in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Terminal / PTY
        - SSH
        - File manager / editor
        - Snippets
        - Themes / appearance
        - Settings / hotkeys
        - Packaging / updates
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or references.
